# POSTGRES_* в .env — только для postgres + user/auth/order. api-gateway БД не использует.
# Список переменных — см. комментарий в корневом docker-compose.yml
#
# Из корня репозитория:
#   docker compose -f JavaInternship-api-gateway/docker-compose.yml --env-file .env pull && docker compose -f JavaInternship-api-gateway/docker-compose.yml --env-file .env up -d
#
# Local build: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

name: javainternship

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  user-service:
    image: maxononion/javainternship-user-service:${IMAGE_TAG:-latest}
    pull_policy: missing
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8081"
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/user_service
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    image: maxononion/javainternship-auth-service:${IMAGE_TAG:-latest}
    pull_policy: missing
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/auth_service
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRATION_MINUTES: ${ACCESS_TOKEN_EXPIRATION_MINUTES}
      REFRESH_TOKEN_EXPIRATION_MINUTES: ${REFRESH_TOKEN_EXPIRATION_MINUTES}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    image: maxononion/javainternship-order-service:${IMAGE_TAG:-latest}
    pull_policy: missing
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8083"
      DB_URL: jdbc:postgresql://postgres:5432/order_service
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started

  api-gateway:
    image: maxononion/javainternship-api-gateway:${IMAGE_TAG:-latest}
    pull_policy: missing
    environment:
      SERVER_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      USER_SERVICE_URI: ${USER_SERVICE_URI}
      AUTH_SERVICE_URI: ${AUTH_SERVICE_URI}
      ORDER_SERVICE_URI: ${ORDER_SERVICE_URI}
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - auth-service
      - order-service

volumes:
  postgres_data:

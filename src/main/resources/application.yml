server:
  port: 8080
spring:
  application:
    name: JavaInternship-api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
            - uri: http://localhost:8081
            - predicates:
                - Path=/users/**

            - id: auth-service
            - uri: http://localhost:8082
            - predicates:
                - Path=/auth/**

            - id: order-service
            - uri: http://localhost:8083
            - predicates:
                - Path=/orders/**

            - id: payment-service
            - uri: http://localhost:8084
            - predicates:
                - Path=/payment/**



